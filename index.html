<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>✨ Tic-Tac-Toe | Animated X & O Battle ✨</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game">
        <h2>⚡ TIC-TAC-TOE ⚡</h2>
        
        <!-- Game status display -->
        <div id="display">✨ X's turn ✨</div>
        
        <!-- Score board - Fixed ID issue: use unique IDs -->
        <div class="score-panel">
            <div class="score-card">
                <span class="score-icon">❌</span>
                <span class="score-label">PLAYER X</span>
                <span class="score-value" id="xwin">0</span>
            </div>
            <div class="score-divider">|</div>
            <div class="score-card">
                <span class="score-icon">⭕</span>
                <span class="score-label">PLAYER O</span>
                <span class="score-value" id="ywin">0</span>
            </div>
        </div>
        
        <!-- Game grid 3x3 -->
        <div id="keys">
            <div cellIndex="0" class="cell"></div>
            <div cellIndex="1" class="cell"></div>
            <div cellIndex="2" class="cell"></div>
            <div cellIndex="3" class="cell"></div>
            <div cellIndex="4" class="cell"></div>
            <div cellIndex="5" class="cell"></div>
            <div cellIndex="6" class="cell"></div>
            <div cellIndex="7" class="cell"></div>
            <div cellIndex="8" class="cell"></div>
        </div>
        
        <!-- Restart button with animation -->
        <button id="restart">🔄 RESTART GAME</button>
        <button id="restartpoint">restartpoint</button>
        
        <!-- Footer hint -->
        <div class="game-hint">🎮 Click any cell to start playing</div>
    </div>
    <script src="app.js"></script>
</body>
</html>
